<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Memory — Test Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #060810;
      --surface: #0c1018;
      --surface-light: #131a26;
      --surface-hover: #1a2234;
      --border: #1e2a40;
      --border-active: #4b82f0;
      --text: #dce2ed;
      --text-muted: #7e8ba0;
      --text-dim: #4a5568;
      --accent: #4b82f0;
      --green: #34d399;
      --amber: #f59e0b;
      --red: #ef6461;
      --purple: #a78bfa;
      --cyan: #22d3ee;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      overflow: hidden;
    }

    /* Layout */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .header-status {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.disconnected { background: var(--red); animation: none; }
    .status-dot.processing { background: var(--amber); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Chat Panel */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.65;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 2px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--surface-light);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
    }

    .message.assistant .tool-badge {
      display: inline-block;
      font-size: 10px;
      font-family: var(--mono);
      padding: 2px 6px;
      background: rgba(75, 130, 240, 0.12);
      color: var(--accent);
      border-radius: 3px;
      margin-bottom: 6px;
    }

    .message.system {
      align-self: center;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--surface-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      display: none;
    }

    .typing-indicator.visible { display: block; }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
    }

    .chat-input:focus { border-color: var(--border-active); }
    .chat-input::placeholder { color: var(--text-dim); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 0 16px;
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Activity Panel */
    .activity-panel {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .activity-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .activity-count {
      font-weight: 500;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .activity-events {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .activity-event {
      padding: 6px 16px;
      font-size: 11px;
      line-height: 1.5;
      border-bottom: 1px solid rgba(30, 42, 64, 0.4);
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .activity-event:hover { background: rgba(30, 42, 64, 0.3); }

    .event-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      min-width: 58px;
    }

    .event-badge {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .event-badge.session  { background: rgba(75, 130, 240, 0.15); color: var(--accent); }
    .event-badge.buffer   { background: rgba(52, 211, 153, 0.12); color: var(--green); }
    .event-badge.scribe   { background: rgba(167, 139, 250, 0.12); color: var(--purple); }
    .event-badge.librarian { background: rgba(245, 158, 11, 0.12); color: var(--amber); }
    .event-badge.dreamer  { background: rgba(34, 211, 238, 0.12); color: var(--cyan); }
    .event-badge.graph    { background: rgba(52, 211, 153, 0.12); color: var(--green); }
    .event-badge.git      { background: rgba(245, 158, 11, 0.12); color: var(--amber); }
    .event-badge.system   { background: rgba(126, 139, 160, 0.12); color: var(--text-muted); }

    .event-msg {
      color: var(--text-muted);
      flex: 1;
      word-break: break-word;
    }

    /* Buffer progress bar */
    .buffer-bar {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
    }

    .buffer-label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-dim);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .buffer-track {
      height: 4px;
      background: var(--surface-hover);
      border-radius: 2px;
      overflow: hidden;
    }

    .buffer-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .buffer-fill.hot { background: var(--amber); }
    .buffer-fill.fire { background: var(--red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* Markdown-lite in messages */
    .message code {
      font-family: var(--mono);
      font-size: 0.9em;
      background: rgba(0,0,0,0.3);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .message pre {
      font-family: var(--mono);
      font-size: 11px;
      background: rgba(0,0,0,0.3);
      padding: 8px 10px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 6px 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-title">Graph Memory — Test Console</div>
      <div class="header-status">
        <span id="bufferStatus">buffer: 0/5</span>
        <span id="sessionStatus">session: --</span>
        <span class="status-dot" id="connectionDot"></span>
        <span id="connectionLabel">connecting</span>
      </div>
    </div>

    <div class="main">
      <div class="chat-panel">
        <div class="chat-messages" id="chatMessages">
          <div class="message system">Session not started. Send a message to begin.</div>
        </div>
        <div class="typing-indicator" id="typingIndicator">agent thinking...</div>
        <div class="chat-input-area">
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="Type a message..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn">Send</button>
        </div>
      </div>

      <div class="activity-panel">
        <div class="activity-header">
          <span>Activity Log</span>
          <span class="activity-count" id="eventCount">0 events</span>
        </div>
        <div class="activity-events" id="activityEvents"></div>
        <div class="buffer-bar">
          <div class="buffer-label">
            <span>Message Buffer</span>
            <span id="bufferLabel">0 / 5</span>
          </div>
          <div class="buffer-track">
            <div class="buffer-fill" id="bufferFill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    let ws = null;
    let eventCount = 0;
    let bufferCount = 0;
    const SCRIBE_INTERVAL = 5;
    let isProcessing = false;
    let currentAssistantMsg = null;

    // --- DOM ---
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const activityEvents = document.getElementById('activityEvents');
    const eventCountEl = document.getElementById('eventCount');
    const bufferLabel = document.getElementById('bufferLabel');
    const bufferFill = document.getElementById('bufferFill');
    const bufferStatus = document.getElementById('bufferStatus');
    const sessionStatus = document.getElementById('sessionStatus');
    const connectionDot = document.getElementById('connectionDot');
    const connectionLabel = document.getElementById('connectionLabel');

    // --- WebSocket ---
    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        connectionDot.className = 'status-dot';
        connectionLabel.textContent = 'connected';
        addActivity('system', 'Connected to server');
      };

      ws.onclose = () => {
        connectionDot.className = 'status-dot disconnected';
        connectionLabel.textContent = 'disconnected';
        addActivity('system', 'Disconnected — retrying in 3s...');
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        connectionDot.className = 'status-dot disconnected';
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleMessage(data);
      };
    }

    function handleMessage(data) {
      switch (data.type) {
        case 'user_message':
          addChatMessage('user', data.content);
          break;

        case 'assistant_text':
          if (!currentAssistantMsg) {
            currentAssistantMsg = addChatMessage('assistant', '');
            typingIndicator.classList.remove('visible');
          }
          currentAssistantMsg.textContent += data.text;
          scrollChat();
          break;

        case 'assistant_done':
          currentAssistantMsg = null;
          isProcessing = false;
          sendBtn.disabled = false;
          connectionDot.className = 'status-dot';
          if (data.cost) {
            sessionStatus.textContent = `cost: $${data.cost.toFixed(4)}`;
          }
          break;

        case 'tool_use_start':
          if (currentAssistantMsg) {
            const badge = document.createElement('div');
            badge.className = 'tool-badge';
            badge.textContent = `using: ${data.tool}`;
            currentAssistantMsg.insertBefore(badge, currentAssistantMsg.firstChild);
          }
          addActivity('graph', `Tool: ${data.tool}`);
          break;

        case 'tool_use_end':
          break;

        case 'activity':
          const category = (data.event_type || '').split(':')[0] || 'system';
          addActivity(category, data.message, data.details);
          updateBuffer(data);
          break;

        case 'status':
          if (data.buffer) {
            bufferCount = data.buffer.bufferCount || 0;
            updateBufferUI();
          }
          break;

        case 'error':
          addChatMessage('system', `Error: ${data.message}`);
          isProcessing = false;
          sendBtn.disabled = false;
          connectionDot.className = 'status-dot';
          break;
      }
    }

    // --- Chat ---
    function addChatMessage(role, content) {
      const msg = document.createElement('div');
      msg.className = `message ${role}`;
      msg.textContent = content;
      chatMessages.appendChild(msg);
      scrollChat();
      return msg;
    }

    function scrollChat() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function sendMessage() {
      const content = chatInput.value.trim();
      if (!content || isProcessing) return;

      chatInput.value = '';
      chatInput.style.height = 'auto';
      isProcessing = true;
      sendBtn.disabled = true;
      connectionDot.className = 'status-dot processing';
      typingIndicator.classList.add('visible');

      ws.send(JSON.stringify({ type: 'user_message', content }));
    }

    // --- Activity Log ---
    function addActivity(category, message, details) {
      eventCount++;
      eventCountEl.textContent = `${eventCount} events`;

      const el = document.createElement('div');
      el.className = 'activity-event';

      const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

      // Map the full type to a badge category
      let badgeCategory = category;
      if (typeof category === 'string') {
        badgeCategory = category.split(':')[0];
      }

      el.innerHTML = `
        <span class="event-time">${time}</span>
        <span class="event-badge ${badgeCategory}">${badgeCategory}</span>
        <span class="event-msg">${escapeHtml(message)}</span>
      `;

      activityEvents.appendChild(el);
      activityEvents.scrollTop = activityEvents.scrollHeight;
    }

    function updateBuffer(data) {
      if (!data.details) return;

      if (data.details.bufferCount !== undefined) {
        bufferCount = data.details.bufferCount;
        updateBufferUI();
      }

      // Buffer cleared event
      if (data.message && data.message.includes('Buffer rotated')) {
        bufferCount = 0;
        updateBufferUI();
      }
    }

    function updateBufferUI() {
      const pct = (bufferCount / SCRIBE_INTERVAL) * 100;
      bufferFill.style.width = `${pct}%`;
      bufferFill.className = 'buffer-fill' +
        (bufferCount >= SCRIBE_INTERVAL ? ' fire' : bufferCount >= 3 ? ' hot' : '');
      bufferLabel.textContent = `${bufferCount} / ${SCRIBE_INTERVAL}`;
      bufferStatus.textContent = `buffer: ${bufferCount}/${SCRIBE_INTERVAL}`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Input Handling ---
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    });

    sendBtn.addEventListener('click', sendMessage);

    // --- Init ---
    connect();
  </script>
</body>
</html>
